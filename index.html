<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>为李羲承显化 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brown:       #c17f4a;
    --brown-dark:  #8b5a2b;
    --brown-light: #e8c99a;
    --cream:       #fdf5e8;
    --cream2:      #f7ead6;
    --red:         #d94f3d;
    --red-soft:    #f08070;
    --bg:          #fdf8f0;
    --text:        #4a2e18;
    --text-muted:  #a07848;
    --white:       #ffffff;
    --shadow:      rgba(180,120,60,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Baloo 2', 'Noto Sans SC', cursive;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* 背景装饰 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 15% 20%, rgba(230,180,100,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 75%, rgba(217,79,61,0.08) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(232,200,150,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  /* 樱花花瓣 */
  .petal {
    position: fixed;
    pointer-events: none;
    opacity: 0;
    animation: petalFall linear infinite;
    top: -40px;
  }
  @keyframes petalFall {
    0%   { opacity: 0;    transform: translateY(0)     rotate(0deg)   translateX(0); }
    8%   { opacity: 0.35; }
    85%  { opacity: 0.2; }
    100% { opacity: 0;    transform: translateY(108vh) rotate(320deg) translateX(60px); }
  }

  /* 右上角计数器 */
  #counter {
    position: fixed;
    top: 22px;
    right: 26px;
    text-align: right;
    z-index: 100;
  }
  #counter .count {
    font-family: 'Baloo 2', 'Noto Sans SC', cursive;
    font-size: 48px;
    font-weight: 800;
    color: var(--brown-dark);
    line-height: 1;
    letter-spacing: -1px;
    transition: transform 0.1s;
    text-shadow: 2px 3px 0px rgba(180,120,60,0.2);
  }
  #counter .count.bump {
    transform: scale(1.18);
  }
  #counter .count-label {
    font-size: 11px;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    margin-top: 2px;
  }


  /* 语言切换按钮 */
  #langBtn {
    position: fixed;
    top: 22px;
    left: 100px;
    background: rgba(255,255,255,0.9);
    border: 2px solid var(--brown-light);
    color: var(--text-muted);
    font-family: 'Baloo 2', 'Noto Sans SC', cursive;
    font-size: 13px;
    font-weight: 400;
    padding: 7px 18px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.25s;
    z-index: 100;
    box-shadow: 0 2px 10px var(--shadow);
  }
  #langBtn:hover {
    border-color: var(--brown);
    color: var(--brown-dark);
    box-shadow: 0 4px 16px rgba(180,120,60,0.2);
  }
  /* 重置按钮 */
  #resetBtn {
    position: fixed;
    top: 22px;
    left: 26px;
    background: rgba(255,255,255,0.9);
    border: 2px solid var(--brown-light);
    color: var(--text-muted);
    font-family: 'Baloo 2', 'Noto Sans SC', cursive;
    font-size: 13px;
    font-weight: 400;
    padding: 7px 18px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.25s;
    z-index: 100;
    box-shadow: 0 2px 10px var(--shadow);
  }
  #resetBtn:hover {
    border-color: var(--brown);
    color: var(--brown-dark);
    box-shadow: 0 4px 16px rgba(180,120,60,0.2);
  }

  /* 标题 */
  .title {
    font-family: 'Baloo 2', 'Noto Sans SC', cursive;
    font-size: 32px;
    font-weight: 800;
    color: var(--brown-dark);
    letter-spacing: 1.5px;
    text-align: center;
    text-shadow: 2px 3px 0px rgba(193,127,74,0.25), -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
  }
  .title span {
    color: var(--red);
    text-shadow: 2px 3px 0px rgba(217,79,61,0.2), -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
  }

  /* 主区域 */
  .main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* 仓鼠按钮 */
  #hamsterBtn {
    cursor: pointer;
    user-select: none;
    position: relative;
    width: 210px;
    height: 210px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    background: none;
    border: none;
    outline: none;
  }

  /* 光晕圆 */
  .halo {
    position: absolute;
    width: 170px;
    height: 170px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(217,79,61,0.12) 0%, transparent 70%);
    transition: all 0.15s;
  }
  .halo-outer {
    width: 210px;
    height: 210px;
    background: radial-gradient(circle, rgba(193,127,74,0.12) 0%, transparent 70%);
    animation: haloPulse 3s ease-in-out infinite;
  }
  @keyframes haloPulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.08); opacity: 1; }
  }

  #hamsterBtn.hit .halo {
    background: radial-gradient(circle, rgba(217,79,61,0.28) 0%, transparent 70%);
    transform: scale(1.15);
  }

  /* 仓鼠图片 */
  #hamsterSvg {
    width: 130px;
    height: 130px;
    transition: transform 0.09s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    filter: drop-shadow(0 6px 16px rgba(139,90,43,0.25));
    position: relative;
    z-index: 2;
  }
  #hamsterBtn.hit #hamsterSvg {
    transform: scale(0.87) translateY(6px) rotate(-2deg);
    filter: drop-shadow(0 2px 6px rgba(139,90,43,0.15));
  }

  /* 提示文字 */
  .tap-hint {
    font-family: 'Baloo 2', 'Noto Sans SC', cursive;
    font-size: 17px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 2px;
    animation: hintPulse 2.5s ease-in-out infinite;
  }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.9; }
  }

  /* 浮动文字 */
  .float-text {
    position: fixed;
    font-size: 15px;
    font-weight: 500;
    color: var(--red);
    pointer-events: none;
    z-index: 200;
    animation: floatUp 1.1s ease-out forwards;
    white-space: nowrap;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-70px) scale(0.75); }
  }

  /* 已达成徽章 */
  .achieved-list {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-wrap: nowrap;
    gap: 6px;
    justify-content: flex-start;
    max-width: 92vw;
    width: 92vw;
    overflow-x: auto;
    overflow-y: hidden;
    z-index: 50;
    padding: 4px 2px 8px;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .achieved-list::-webkit-scrollbar {
    display: none;
  }
  .achieved-badge {
    font-size: 11px;
    font-weight: 400;
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(255,255,255,0.9);
    border: 2px solid var(--brown-light);
    color: var(--red);
    letter-spacing: 0.5px;
    white-space: nowrap;
    flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(180,120,60,0.15);
  }

  /* 烟花 */
  #fireworksCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 300;
  }

  /* 里程碑弹窗 */
  #milestoneOverlay {
    position: fixed;
    inset: 0;
    background: rgba(253,245,230,0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    z-index: 400;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #milestoneOverlay.show {
    display: flex;
    animation: fadeIn 0.35s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .milestone-box {
    text-align: center;
    padding: 48px 56px;
    background: linear-gradient(145deg, #ffffff, #fdf5e8);
    border: 2.5px solid var(--brown-light);
    border-radius: 28px;
    box-shadow: 0 0 40px rgba(193,127,74,0.15), 0 20px 50px rgba(139,90,43,0.1), inset 0 1px 0 rgba(255,255,255,0.9);
    max-width: 380px;
    width: 90vw;
    animation: popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .milestone-icon {
    font-size: 52px;
    display: block;
    margin-bottom: 16px;
    animation: iconBounce 0.5s ease 0.2s both;
  }
  @keyframes iconBounce {
    from { transform: translateY(16px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .milestone-count {
    font-family: 'Baloo 2', 'Noto Sans SC', cursive;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .milestone-text {
    font-family: 'Baloo 2', 'Noto Sans SC', cursive;
    font-size: 28px;
    font-weight: 800;
    color: var(--brown-dark);
    margin-bottom: 10px;
    letter-spacing: 0px;
    text-shadow: 2px 2px 0px rgba(193,127,74,0.2);
  }

  .milestone-sub {
    font-family: 'Baloo 2', 'Noto Sans SC', cursive;
    font-size: 14px;
    font-weight: 400;
    color: var(--text-muted);
    line-height: 1.9;
    margin-bottom: 32px;
  }

  .milestone-btn {
    background: linear-gradient(135deg, var(--red), #e86a58);
    color: var(--white);
    border: none;
    padding: 13px 44px;
    border-radius: 30px;
    font-family: 'Baloo 2', 'Noto Sans SC', cursive;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 6px 20px rgba(217,79,61,0.3);
    transition: all 0.22s;
  }
  .milestone-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(217,79,61,0.4);
  }
</style>
</head>

// ========== 音效 ==========
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTap() {
  try {
    const now = audioCtx.currentTime;
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(520, now);
    osc.frequency.exponentialRampToValueAtTime(320, now + 0.1);
    gain.gain.setValueAtTime(0.55, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
    osc.start(now); osc.stop(now + 0.25);

    const osc2  = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.connect(gain2); gain2.connect(audioCtx.destination);
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(900, now);
    osc2.frequency.exponentialRampToValueAtTime(600, now + 0.06);
    gain2.gain.setValueAtTime(0.2, now);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc2.start(now); osc2.stop(now + 0.12);
  } catch(e){}
}

// ========== 烟花 ==========
const canvas = document.getElementById('fireworksCanvas');
const ctx    = canvas.getContext('2d');
let particles = [];
let fwActive  = false;

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function spawnFirework(x, y) {
  const colors = ['#c17f4a','#e8c99a','#fff','#d94f3d','#f08070','#fdf5e8','#e8b87a','#f4d0a0'];
  const n = 70 + Math.random() * 40;
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i) / n + Math.random() * 0.4;
    const speed = 2.5 + Math.random() * 7;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,
      alpha: 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      size:  1.8 + Math.random() * 2.8,
      gravity: 0.13 + Math.random() * 0.08,
      decay:   0.013 + Math.random() * 0.009,
    });
  }
}

function launchFireworks() {
  fwActive = true;
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  spawnFirework(cx, cy * 0.38);
  setTimeout(() => spawnFirework(cx - 110, cy * 0.5),  160);
  setTimeout(() => spawnFirework(cx + 110, cy * 0.48), 220);
  setTimeout(() => spawnFirework(cx,       cy * 0.28), 420);
  setTimeout(() => spawnFirework(cx - 70,  cy * 0.6),  560);
  setTimeout(() => spawnFirework(cx + 70,  cy * 0.32), 680);
  setTimeout(() => { fwActive = false; }, 3200);
  requestAnimationFrame(animateFW);
}

function animateFW() {
  ctx.fillStyle = 'rgba(240,247,255,0.18)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.alpha > 0.02);
  for (const p of particles) {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.985;
    p.alpha -= p.decay;
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle   = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur  = 5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  if (particles.length > 0 || fwActive) {
    requestAnimationFrame(animateFW);
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}

const floats = ['🎤', '🎵', '🎶', '⭐', '🌟', '💫', '✨', '🎤', '⭐', '🎵'];
let fi = 0;
function showFloat(x, y) {
  const el = document.createElement('div');
  el.className   = 'float-text';
  el.textContent = floats[fi++ % floats.length];
  el.style.left  = (x - 20) + 'px';
  el.style.top   = (y - 10) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1150);
}

function updateUI() {

  // 已达成徽章

  list.innerHTML = '';
  for (const m of MILESTONES) {
    if (achievedSet.has(m.count)) {
      const b = document.createElement('div');
      b.className   = 'achieved-badge';
      b.textContent = m.icon + ' ' + m.text;
      list.appendChild(b);
    }
  }
}

// ========== 交互 ==========
function startHit(e) {
  if (e) e.preventDefault();
  document.getElementById('hamsterBtn').classList.add('hit');
}
function endHit() {
  setTimeout(() => document.getElementById('hamsterBtn').classList.remove('hit'), 200);
}

let lastHitTime = 0;

function hit(e) {
  if (e && e.preventDefault) e.preventDefault();
  const now = Date.now();
  if (now - lastHitTime < 100) return; // 防止重复触发
  lastHitTime = now;

  if (audioCtx.state === 'suspended') audioCtx.resume();
  count++;
  save();
  playTap();
  updateUI();

  const btn  = document.getElementById('hamsterBtn');
  const rect = btn.getBoundingClientRect();
  showFloat(rect.left + rect.width / 2, rect.top + 20);

  const ms = MILESTONES.find(m => m.count === count);
  if (ms && !achievedSet.has(ms.count)) {
    achievedSet.add(ms.count);
    save();
    updateUI();
    setTimeout(() => showMilestone(ms), 380);
  }
}

function resetCount() {
  if (!confirm(i18n[currentLang].confirmReset)) return;
  count = 0;
  achievedSet.clear();
  save();
  updateUI();
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    startHit();
    hit();
    setTimeout(endHit, 200);
  }
});
